<!DOCTYPE html>
<html lang="en-us">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, user-scalable=no"
  >

  <title>Unity WebGL Player | finalgame</title>

  <link rel="shortcut icon" href="TemplateData/favicon.ico">
  <link rel="stylesheet" href="TemplateData/style.css?v=3">
</head>

<body>
  <div id="unity-container" class="unity-desktop">
    <canvas
      id="unity-canvas"
      width="1280"
      height="720"
      tabindex="-1">
    </canvas>

    <div id="unity-loading-bar">
      <div id="unity-logo"></div>

      <div id="unity-progress-bar-empty">
        <div id="unity-progress-bar-full"></div>
      </div>
    </div>

    <div id="unity-warning"></div>

    <div id="unity-footer">
      <div id="unity-webgl-logo"></div>
      <div id="unity-fullscreen-button"></div>
      <div id="unity-build-title">finalgame</div>
    </div>
  </div>

  <script>
    const container = document.querySelector("#unity-container");
    const canvas = document.querySelector("#unity-canvas");
    const loadingBar = document.querySelector("#unity-loading-bar");
    const progressBarFull = document.querySelector(
      "#unity-progress-bar-full"
    );
    const fullscreenButton = document.querySelector(
      "#unity-fullscreen-button"
    );
    const warningBanner = document.querySelector("#unity-warning");

    function unityShowBanner(message, type) {
      function updateBannerVisibility() {
        warningBanner.style.display =
          warningBanner.children.length > 0 ? "block" : "none";
      }

      const messageElement = document.createElement("div");
      messageElement.innerHTML = message;

      if (type === "error") {
        messageElement.style =
          "background: red; color: white; padding: 10px;";
      } else if (type === "warning") {
        messageElement.style =
          "background: yellow; color: black; padding: 10px;";
      }

      warningBanner.appendChild(messageElement);
      updateBannerVisibility();

      if (type !== "error") {
        setTimeout(() => {
          warningBanner.removeChild(messageElement);
          updateBannerVisibility();
        }, 5000);
      }
    }

    function resizeUnityCanvas() {
      const targetAspect = 16 / 9;

      let width = window.innerWidth;
      let height = window.innerHeight;

      if (width / height > targetAspect) {
        width = height * targetAspect;
      } else {
        height = width / targetAspect;
      }

      canvas.style.width = Math.floor(width) + "px";
      canvas.style.height = Math.floor(height) + "px";
    }

    const buildUrl = "Build";
    const loaderUrl = buildUrl + "/docs.loader.js";

    const config = {
      dataUrl: buildUrl + "/docs.data.unityweb",
      frameworkUrl: buildUrl + "/docs.framework.js.unityweb",
      codeUrl: buildUrl + "/docs.wasm.unityweb",
      streamingAssetsUrl: "StreamingAssets",
      companyName: "DefaultCompany",
      productName: "finalgame",
      productVersion: "1.0",
      showBanner: unityShowBanner
    };

    const isMobile =
      /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

    if (isMobile) {
      container.className = "unity-mobile";
      canvas.className = "unity-mobile";
    } else {
      resizeUnityCanvas();
      window.addEventListener("resize", resizeUnityCanvas);
    }

    loadingBar.style.display = "block";

    const script = document.createElement("script");
    script.src = loaderUrl;

    script.onload = () => {
      createUnityInstance(canvas, config, progress => {
        progressBarFull.style.width = 100 * progress + "%";
      })
        .then(unityInstance => {
          loadingBar.style.display = "none";

          if (fullscreenButton) {
            fullscreenButton.onclick = () => {
              unityInstance.SetFullscreen(1);
            };
          }
        })
        .catch(message => {
          alert(message);
        });
    };

    document.body.appendChild(script);
  </script>
</body>
</html>
